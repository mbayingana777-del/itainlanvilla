<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambridge Italian Villa</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0b0b;
color:#fff;
}

/* HERO */
.hero{
height:90vh;
background:url('https://images.unsplash.com/photo-1601924582975-7e1d4c6d5d38') center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:3rem;
margin-bottom:10px;
}

.hero p{
font-size:1.2rem;
margin-bottom:20px;
}

.btn{
padding:12px 25px;
background:#ff7b00;
color:#fff;
text-decoration:none;
border-radius:5px;
margin:5px;
display:inline-block;
}

/* FEATURED MENU */
.menu{
padding:60px 20px;
text-align:center;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(255,123,0,0.6);
}

.card h3{
padding:10px;
}

/* FULL MENU LINK */
.full-menu{
text-align:center;
padding:40px;
}

/* SIGNUP */
.signup{
padding:60px 20px;
text-align:center;
background:#111;
}

input{
padding:10px;
width:250px;
border:none;
border-radius:5px;
margin-right:10px;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<h1>Ambridge Italian Villa</h1>
<p>Authentic Italian & Mediterranean Flavor</p>
<a href="https://www.ambridgeitalianvilla.com/our-menu/" class="btn">View Menu</a>
<a href="#" class="btn">Order Now</a>
</section>

<!-- FEATURED MENU -->
<section class="menu">
<h2>Featured Menu</h2>

<div class="menu-grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65">
<h3>Pizza</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1551183053-bf91a1d81141">
<h3>Pasta</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1604908177522-4020e7c86a6f">
<h3>Gyros</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<h3>Stromboli</h3>
</div>

</div>
</section>

<!-- FULL MENU -->
<section class="full-menu">
<h2>Want the full experience?</h2>
<a href="https://www.ambridgeitalianvilla.com/our-menu/" class="btn">View Full Menu</a>
</section>

<!-- SIGNUP -->
<section class="signup">
<h2>Get Deals & Specials</h2>
<input type="email" placeholder="Enter your email">
<button class="btn">Sign Up</button>
</section>

</body>
</html>
